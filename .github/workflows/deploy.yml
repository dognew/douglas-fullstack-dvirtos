name: Deploy D-VirtOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🏗️ Setup & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cp -r dist/* ../ 

      - name: 📦 Setup & Install Backend
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: 🚀 Sync Files to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          dry-run: false 
          exclude: |
            .git*
            .github*
            **/node_modules/**
            frontend/src/**
            frontend/public/**
            backend/tests/**
            backend/vendor/**
            .env
            docker-compose.yml
            Dockerfile
            README.md
            LEIAME.md
            LICENSE
            Makefile
            makefile